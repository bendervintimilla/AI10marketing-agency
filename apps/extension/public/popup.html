<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>AdAgency AI Connector</title>
    <style>
        :root {
            --bg: #0f0a1e;
            --surface: #1e1535;
            --border: #2d2050;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 16px;
            min-width: 320px;
        }
        h1 { font-size: 14px; margin: 0 0 12px; font-weight: 700; letter-spacing: -0.01em; }
        .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        input, select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background: var(--accent);
            color: white;
            border: 0;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        button:hover { background: var(--accent-hover); }
        button.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .status {
            font-size: 11px;
            color: var(--muted);
            margin-top: 8px;
            min-height: 14px;
        }
        .badge {
            display: inline-block;
            font-size: 10px;
            background: rgba(124, 58, 237, 0.2);
            color: #c4b5fd;
            padding: 2px 6px;
            border-radius: 999px;
        }
        .ctx {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .muted { color: var(--muted); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>AdAgency AI <span class="badge">v0.1</span></h1>

    <div id="login-view">
        <div class="row"><input id="email" type="email" placeholder="Email" autocomplete="username" /></div>
        <div class="row"><input id="password" type="password" placeholder="Password" autocomplete="current-password" /></div>
        <div class="row"><button id="login-btn">Sign in</button></div>
        <div class="status" id="login-status"></div>
    </div>

    <div id="main-view" class="hidden">
        <div id="ctx-block" class="ctx muted">No platform context detected.</div>
        <div class="row">
            <select id="brand-select"><option value="">Loading brands…</option></select>
        </div>
        <div class="row">
            <button id="send-btn">Send context to brand</button>
            <button id="logout-btn" class="secondary">Sign out</button>
        </div>
        <div class="status" id="main-status"></div>
    </div>

    <script src="popup.js" type="module"></script>
</body>
</html>
